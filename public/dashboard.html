<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>StudyHelp Form Dasboard</h1>
    <p>Welcome, User!</p>

    <h2>Categories</h2>
    <ul>
        <li>JavaScript</li>
        <li>HTML & css</li>
        <li>Databases</li>
        <li>GitHub</li>
    </ul>

     <h2>Ask a Qusetion</h2>

     <form id="questionForm">

        <input 
        type="text" 
        id="questionTitle"
        placeholder="Qusetion Title" 
        required>
        
        <br><br>

        <textarea 
        id="questionContent"
        placeholder="Type your question here..." 
        rows="5" 
        cols="40" 
        required></textarea>
       
        <br><br>

        <button type="button" onclick="postQuestion()">Post Question</button>
     </form>

     <h2>Posted Question</h2>
     <div id="questionList"></div>

     <br>

    <a href="index.html">Logout</a>

    <script src="dashboard.js"></script>
    
</body>
</html>
